# yaml-language-server: $schema=https://raw.githubusercontent.com/sgnl-actions/schemas/main/metadata.schema.json
name: ad-enable-user
description: Enable a disabled user account in on-premise Active Directory via LDAP

# Input parameters for web form generation
inputs:
  baseDN:
    type: text
    description: Base DN to search for the user (e.g., DC=corp,DC=example,DC=com)
    required: true
    validation:
      min: 1
      max: 500

  samAccountName:
    type: text
    description: The user's sAMAccountName (pre-Windows 2000 logon name) to lookup
    required: true
    validation:
      min: 1
      max: 256

  address:
    type: text
    description: Optional LDAP server URL override (e.g., ldaps://ad.corp.example.com:636)
    required: false
    validation:
      min: 1
      max: 200

  dry_run:
    type: boolean
    description: When true, validates parameters and logs intended actions without making changes to Active Directory
    required: false

# Expected output structure
outputs:
  status:
    type: text
    description: Operation result (success, failed, etc.)

  userDN:
    type: text
    description: The resolved Distinguished Name of the user

  enabled:
    type: boolean
    description: Whether the user was newly enabled (false if already enabled)

  previousUAC:
    type: number
    description: The userAccountControl value before the operation

  newUAC:
    type: number
    description: The userAccountControl value after the operation

  baseDN:
    type: text
    description: The base DN used to search for the user

  samAccountName:
    type: text
    description: The sAMAccountName used to identify the user

  address:
    type: text
    description: The LDAP server URL that was used

environment:
  ADDRESS:
    type: text
    description: LDAP server URL
    required: false
  TLS_SKIP_VERIFY:
    type: text
    description: Skip TLS certificate verification (set to 'true' to disable)
    required: false

secrets:
  BASIC_USERNAME:
    type: text
    description: LDAP bind username (Distinguished Name)
    required: true
  BASIC_PASSWORD:
    type: text
    description: LDAP bind password
    required: true
